targets:
  main:
    drivers:
      QEMUDriver:
        qemu_bin: qemu
        machine: q35
        cpu: Nehalem
        memory: 1024M
        kernel: barebox.efi
        extra_args: >
          -bios OVMF.fd -global ICH9-LPC.noreboot=false
      BareboxDriver:
        prompt: 'barebox@[^:]+:[^ ]+ '
        bootstring: 'commandline:'
      ShellDriver:
        prompt: 'root@\w+:[^ ]+ '
        login_prompt: ' login: '
        login_timeout: 90
        username: 'root'
      BareboxStrategy: {}
    features:
      - barebox
      - pci
    runner:
        tuxmake_arch: x86_64
        kconfig_add:
            - CONFIG_DRIVER_SERIAL_NS16550=y
            - CONFIG_CONSOLE_ACTIVATE_FIRST=y # avoid duplicate output
        download:
            OVMF.fd: /usr/share/qemu/OVMF.fd
images:
  barebox.efi: ../../barebox.efi
tools:
  qemu: /usr/bin/qemu-system-x86_64
