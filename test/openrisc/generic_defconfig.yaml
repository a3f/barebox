targets:
  main:
    drivers:
      QEMUDriver:
        qemu_bin: qemu
        machine: or1k-sim
        cpu: or1200
        memory: 256M
        kernel: barebox
        extra_args: ''
      BareboxDriver:
        prompt: 'barebox@[^:]+:[^ ]+ '
        bootstring: 'commandline:'
      ShellDriver:
        prompt: 'root@\w+:[^ ]+ '
        login_prompt: ' login: '
        login_timeout: 90
        username: 'root'
      BareboxStrategy: {}
    features:
      - barebox
images:
  barebox: ../../barebox
tools:
  qemu: /usr/bin/qemu-system-or1k
