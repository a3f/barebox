targets:
  main:
    drivers:
      QEMUDriver:
        qemu_bin: qemu
        machine: virt
        cpu: cortex-a57
        memory: 1024M
        kernel: barebox-dt-2nd.img
        extra_args: ''
      BareboxDriver:
        prompt: 'barebox@[^:]+:[^ ]+ '
        bootstring: 'commandline:'
      ShellDriver:
        prompt: 'root@\w+:[^ ]+ '
        login_prompt: ' login: '
        login_timeout: 90
        username: 'root'
      BareboxStrategy: {}
    features:
      - barebox
      - virtio-mmio
    runner:
      tuxmake_arch: arm64
images:
  barebox-dt-2nd.img: ../../images/barebox-dt-2nd.img
tools:
  qemu: /usr/bin/qemu-system-aarch64
